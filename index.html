<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>三国杀 · 全模式对决 | 老戏骨技能修复</title>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        :root{--bg:#1a0a00;--gold:#d4a853;--card-bg:#f5e6c8;--hp:#e74c3c;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:var(--bg);background-image:radial-gradient(ellipse at center,#2c1810 0%,#0d0500 100%);font-family:'STSong','SimSun','KaiTi',serif;color:#f0d9a0;min-height:100vh;user-select:none;}
        .container{max-width:1200px;margin:0 auto;padding:10px;}
        .header{text-align:center;padding:15px 0;border-bottom:2px solid var(--gold);margin-bottom:15px;}
        .header h1{font-size:2.2em;color:var(--gold);letter-spacing:4px;}
        .menu{display:flex;flex-direction:column;gap:12px;max-width:450px;margin:20px auto;}
        .menu button{padding:14px 20px;font-size:1.1em;border:2px solid var(--gold);background:linear-gradient(180deg,#5c3322 0%,#3d1f12 100%);color:var(--gold);cursor:pointer;border-radius:8px;letter-spacing:2px;transition:all 0.3s;font-family:inherit;}
        .menu button:hover{background:#7a4430;box-shadow:0 0 20px rgba(212,168,83,0.4);}
        .game-area{display:none;}.game-area.active{display:block;}
        .players-container{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
        .player-zone{background:rgba(61,34,23,0.9);border:2px solid #5c3a28;border-radius:12px;padding:10px;width:230px;min-width:180px;transition:0.3s;}
        .player-zone.current-turn{border-color:var(--gold);box-shadow:0 0 25px rgba(212,168,83,0.6);}
        .player-zone.target-selectable{cursor:pointer;border-color:#ff0;}
        .hp-dot{width:16px;height:16px;border-radius:50%;background:var(--hp);border:2px solid #ff4444;display:inline-block;margin:1px;}
        .hp-dot.lost{background:#333;border-color:#555;}
        .hand-cards{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
        .card-mini{width:40px;height:56px;border-radius:4px;border:2px solid #8b7355;background:var(--card-bg);cursor:pointer;font-size:0.65em;text-align:center;color:#2c1810;font-weight:bold;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:0.2s;}
        .card-mini.selected{border-color:#ff0;box-shadow:0 0 10px gold;transform:translateY(-6px);}
        .card-mini.red{color:#c0392b;}.card-mini.black{color:#1a1a1a;}
        .card-back{width:40px;height:56px;border-radius:4px;border:2px solid #555;background:repeating-linear-gradient(45deg,#1a3a5c,#0d2440 10px);}
        .equip-zone{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;}
        .equip-slot{width:36px;height:48px;border:1px dashed #6b4e30;background:rgba(0,0,0,0.4);font-size:0.55em;display:flex;align-items:center;justify-content:center;border-radius:4px;}
        .action-buttons{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0;}
        .log-panel{background:rgba(0,0,0,0.7);border-radius:8px;padding:8px;height:160px;overflow-y:auto;font-size:0.8em;margin-top:8px;}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:100;}
        .modal{background:#2c1810;border:2px solid var(--gold);border-radius:12px;padding:20px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;}
        .general-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;}
        .general-card{background:#3d2217;border:1px solid #5c3a28;padding:10px;cursor:pointer;text-align:center;border-radius:8px;font-size:0.8em;transition:0.3s;}
        .general-card.selected{border-color:#ff0;background:#5c3a28;}
        .skill-desc{font-size:0.7em;color:#b8956a;text-align:left;margin-top:5px;line-height:1.3;}
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header"><h1>🏯 三国杀 · 全模式对决</h1><div style="color:#b8956a;">老戏骨技能修复</div></div>
    <div class="menu" id="mainMenu">
        <button onclick="startDuel()">⚔️ 人机单挑</button>
        <button onclick="startSameDevice()">📱 同设备双人</button>
        <button onclick="startDouDiZhu()">🏠 斗地主模式</button>
        <button onclick="startIdentity()">🎭 身份模式</button>
        <button onclick="showCreateRoom()">🌐 联机房间</button>

    </div>
    <div class="game-area" id="gameArea"><div class="players-container" id="battlefield"></div><div class="action-buttons" id="actionButtons"></div><div class="log-panel" id="logPanel"></div></div>

</div>
<script>
// ==================== 核心数据 ====================
const SUITS=['♠','♥','♣','♦']; const SUIT_COLORS={'♠':'black','♥':'red','♣':'black','♦':'red'};
function createCard(id,name,type,suit,number,extra={}){return{id,name,type,suit,number,color:SUIT_COLORS[suit],...extra};}
function buildDrawPile(){
    let cards=[],cid=0;
    const shaSuits=[['♠',7],['♠',8],['♠',9],['♠',10],['♣',2],['♣',3],['♣',4],['♣',5],['♣',6],['♣',7],['♣',8],['♣',9],['♣',10],['♥',10],['♥',11],['♦',6],['♦',7],['♦',8],['♦',9],['♦',10]];
    shaSuits.forEach(([s,n])=>cards.push(createCard(cid++,'杀','basic',s,n,{dmgType:'normal'})));
    for(let i=0;i<5;i++)cards.push(createCard(cid++,'火杀','basic','♥',4+i,{dmgType:'fire'}));
    for(let i=0;i<5;i++)cards.push(createCard(cid++,'雷杀','basic','♠',4+i,{dmgType:'thunder'}));
    ['♥','♦'].forEach(s=>{for(let n=2;n<=8;n++)cards.push(createCard(cid++,'闪','basic',s,n));});
    cards.push(createCard(cid++,'闪','basic','♥',12));
    ['♥','♦'].forEach(s=>{for(let n=3;n<=6;n++)cards.push(createCard(cid++,'桃','basic',s,n));});
    ['♣','♦','♥'].forEach((s,i)=>cards.push(createCard(cid++,'酒','basic',s,3+i)));
    cards.push(createCard(cid++,'酒','basic','♠',6),createCard(cid++,'酒','basic','♣',12));
    const tricks=[['过河拆桥','♠',3],['过河拆桥','♠',4],['过河拆桥','♣',3],['过河拆桥','♥',3],['顺手牵羊','♠',3],['顺手牵羊','♠',4],['顺手牵羊','♦',3],['决斗','♠',1],['决斗','♣',1],['决斗','♦',1],['南蛮入侵','♠',7],['南蛮入侵','♣',7],['万箭齐发','♥',1],['万箭齐发','♥',13],['桃园结义','♥',2],['五谷丰登','♥',5],['无中生有','♥',7],['无中生有','♥',8],['无中生有','♥',9],['借刀杀人','♣',11],['无懈可击','♠',11],['无懈可击','♣',12],['无懈可击','♥',11],['乐不思蜀','♠',6],['乐不思蜀','♥',6],['乐不思蜀','♣',6],['兵粮寸断','♠',10],['兵粮寸断','♣',4],['闪电','♠',2],['闪电','♥',12],['铁索连环','♠',10],['铁索连环','♣',10],['铁索连环','♠',11],['铁索连环','♣',11]];
    tricks.forEach(([name,s,n])=>cards.push(createCard(cid++,name,['乐不思蜀','兵粮寸断','闪电'].includes(name)?'delay_trick':'trick',s,n)));
    const equips=[['诸葛连弩','weapon','♣',1,1],['诸葛连弩','weapon','♦',1,1],['雌雄双股剑','weapon','♠',2,2],['青釭剑','weapon','♠',6,2],['古锭刀','weapon','♠',2,2],['寒冰剑','weapon','♠',2,2],['朱雀羽扇','weapon','♦',5,2],['麒麟弓','weapon','♥',5,3],['贯石斧','weapon','♦',5,3],['青龙偃月刀','weapon','♠',5,3],['丈八蛇矛','weapon','♠',5,3],['方天画戟','weapon','♦',5,4],['八卦阵','armor','♠',2],['八卦阵','armor','♣',2],['仁王盾','armor','♣',2],['藤甲','armor','♠',2],['白银狮子','armor','♣',3],['骅骝','atk_horse','♦',13],['绝影','atk_horse','♠',5],['紫骍','atk_horse','♠',5],['大宛','def_horse','♥',13],['的卢','def_horse','♣',5],['赤兔','def_horse','♥',5]];
    equips.forEach(([name,etype,s,n,range])=>{let c=createCard(cid++,name,'equip',s,n);c.equipType=etype;c.range=range;cards.push(c);});
    for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]];}
    return cards;
}
const SKILL_DESC={
    '勾手':'使用牌指定角色后，可弃1张牌令目标+1','车子':'受到伤害时，将造成伤害的牌标记为“车”','飞车':'出牌阶段限一次，移去一张“车”视为使用闪电','QQ':'锁定技，闪电对你造成伤害恒定为1',

    '解体':'锁定技，击杀或被击杀后转变为尸块形态','尸灵':'锁定技，胜利条件与干尸保持一致','控尸':'锁定技，被你击杀的角色转变为尸块',
    '尸变':'锁定技，可自爆对上下家各造成1点可被闪避的伤害','赤兔':'锁定技，不能被对手的锦囊牌选为目标','BQ':'你打出伤害的数值=1+损失体力+累计击杀数',
    '拾荒':'濒死时可选择：队友掉1体回2体，或敌人掉1体回1体','暧昧':'场上任意角色濒死时，可立刻打出一张不限距离无法响应的杀',
    '白粉':'开局获得4张蛋白粉(红=桃/黑=酒)，可消耗手牌捞回2次','依赖':'锁定技，蛋白粉全部消失时自身直接阵亡',
    '逃单':'单次受超过1点伤害时，弃等量牌将伤害压至1点','钢教':'结束阶段选定本轮用过的花色，下家出该花色牌需交给你一张手牌',
    '被贬':'觉醒技，濒死触发，体力上限变3、体力回满，清空所有技能',
    '大头':'锁定技，每回合可免疫1点普通【杀】的伤害','邪笑':'出牌阶段，弃置本回合对你造成过伤害的一名角色的两张手牌（每名角色限一次）',
    '通背':'锁定技：①每回合前两张红色【杀】无法响应；②造成伤害后判定，红色拿判定牌，黑色弃目标一手牌；目标无手牌无防具时伤害+1',
    '演戏':'弃2张手牌或打出一张【无懈可击】，令敌方一名角色弃置一张牌（手牌或装备）',
    '钢尺':'每回合一次，弃置自己和对方各一张牌，对对方造成1点伤害',
    '忆景':'扣除1点体力并弃1张手牌，摸3张牌，这些牌仅限本回合使用，回合结束时弃置',
    '四马':'锁定技，你与其他角色计算距离时永久-1',
    '肛尺':'你可以将【铁索连环】当雷【杀】使用或打出；你的雷杀无次数限制；铁索连环可重铸',
    '帽子':'限定技，弃置所有手牌，回复等于弃牌数量的体力，若满血则增加等量体力上限并回满',
    '杀手':'选择x，扣x点体力或弃2x张手牌，摸x张杀，本回合目标需一次出x张闪才能抵消'
};
const GENERALS={
    '大兄':{name:'大兄',title:'QQ飞车享受者',hp:3,skills:['勾手','车子','飞车','QQ'],carTokens:[],gender:'male'},
    '大白鸡':{name:'大白der鸡',title:'白幼瘦',hp:3,skills:['吃笔','顶撞'],chiBiState:'yin',gender:'female'},
    '陈茄三':{name:'陈茄三',title:'一日十三次',hp:3,skills:['跳远','代数','几何','新定','精旺'],gender:'male'},
    '康康':{name:'康康',title:'康神开播了',hp:4,skills:['变脚','耳机'],xiaoJiaoYa:[],gender:'male'},
    '顺鸟':{name:'顺鸟',title:'寒冰射手',hp:4,skills:['射手','跳墙'],shooterCount:0,gender:'female'},
    '饼王':{name:'饼王',title:'印度飞饼',hp:20,skills:['炫富','女色','黄温'],huangWenUsed:false,gender:'male'},
    '干尸':{name:'干尸',title:'最干之人',hp:4,skills:['握力','变干','脱水','解体'],woliUsed:false,gender:'male'},
    '尸块':{name:'尸块',title:'尸灵显现',hp:4,skills:['尸灵','控尸','尸变'],gender:'male'},
    '菠萝':{name:'菠萝',title:'励德四班的名将',hp:4,skills:['赤兔','BQ','拾荒','暧昧'],killCount:0,gender:'female'},
    '大肌肉':{name:'大肌肉',title:'蛋白粉之神',hp:4,skills:['白粉','依赖'],proteinPowder:[],powderSalvage:0,gender:'male'},
    '王锐阴':{name:'王锐阴',title:'慧德二班放逐者',hp:4,skills:['逃单','钢教','被贬'],awakened:false,gangJiaoSuit:null,gender:'male'},
    '张仪':{name:'张仪',title:'通背大师',hp:3,skills:['大头','邪笑','通背'],gender:'female'},
    '戏骨':{name:'戏骨',title:'奥斯卡帝',hp:4,skills:['演戏','钢尺','忆景'],gender:'male'},
    '老戏骨':{name:'老戏骨',title:'第一杀手',hp:4,skills:['四马','肛尺','帽子','杀手'],gender:'male'}
};
class Player{
    constructor(name,genKey,isAI=false,role=''){
        const g=GENERALS[genKey]; this.name=name; this.genKey=genKey; this.generalName=g.name; this.hp=g.hp; this.maxHp=g.hp; this.skills=[...g.skills]; this.hand=[]; this.equips={weapon:null,armor:null,def_horse:null,atk_horse:null};
        this.judgeZone=[]; this.isAI=isAI; this.alive=true; this.role=role; this.roundShaUsed=0; this.jiuBuff=null;
        this.carTokens=[...g.carTokens||[]]; this.xiaoJiaoYa=[]; this.shooterCount=g.shooterCount||0; this.huangWenUsed=g.huangWenUsed||false; this.revealedRole=null; this.skillUsedThisTurn={};
        this.gender=g.gender||'male'; this.chiBiState=g.chiBiState||'yin'; this.woliUsed=false; this.proteinPowder=[]; this.powderSalvage=g.powderSalvage||0; this.killCount=g.killCount||0;
        this.awakened=g.awakened||false; this.gangJiaoSuit=null; this.shieldedSkills=[];
        this.tempCards=[]; this.damageSourcesThisTurn=[]; this.immuneNormalShaUsed=false; this.redShaCountThisTurn=0; this.xiexiaoUsedTargets=[];
        this.hatUsed=false; this.killerX=0; this.killerActive=false; this.killerCards=[];
    }
    getAttackRange(){let r=1;if(this.equips.weapon?.range)r=this.equips.weapon.range;if(this.equips.atk_horse)r+=1;return r;}
    getDistanceTo(target){
        let d=1;
        if(target.equips.def_horse)d+=1;
        if(this.equips.atk_horse)d-=1;
        if(this.skills.includes('四马')&&!this.shieldedSkills.includes('四马'))d-=1;
        return Math.max(1,d);
    }
    getHandLimit(){return this.skills.includes('精旺')&&!this.shieldedSkills.includes('精旺')?13:this.hp;}
}
let G={mode:null,players:[],drawPile:[],discardPile:[],turnIndex:0,phase:'wait',roundCount:0,firstRoundDone:false,gameOver:false,selectedCards:[],pendingTarget:null,pendingResponse:null,pendingAction:null,pendingAOE:null,aoeQueue:null,peer:null,conn:null,isHost:false,sameDeviceView:0};
function addLog(msg){const lp=document.getElementById('logPanel');if(lp){const d=document.createElement('div');d.textContent='▸ '+msg;lp.prepend(d);if(lp.children.length>60)lp.removeChild(lp.lastChild);}}
function drawCards(count){let drawn=[];for(let i=0;i<count;i++){if(G.drawPile.length===0){if(G.discardPile.length===0)break;G.drawPile=[...G.discardPile];G.discardPile=[];for(let j=G.drawPile.length-1;j>0;j--){const k=Math.floor(Math.random()*(j+1));[G.drawPile[j],G.drawPile[k]]=[G.drawPile[k],G.drawPile[j]];}}drawn.push(G.drawPile.pop());}return drawn;}
function initGame(mode,playerConfigs){
    G.mode=mode;G.players=[];G.drawPile=buildDrawPile();G.discardPile=[];G.gameOver=false;G.turnIndex=0;G.firstRoundDone=false;G.selectedCards=[];G.pendingTarget=null;G.pendingResponse=null;G.pendingAction=null;G.pendingAOE=null;G.aoeQueue=null;
    if(G.mode==='sameDevice')G.sameDeviceView=0;
    playerConfigs.forEach(cfg=>{let p=new Player(cfg.name,cfg.gen,cfg.isAI||false,cfg.role||'');p.hand.push(...drawCards(4));if(p.genKey==='大肌肉'){p.proteinPowder=[createCard(99901,'蛋白粉(红)','special','♥',1,{heal:true,isPowder:true}),createCard(99902,'蛋白粉(红)','special','♥',2,{heal:true,isPowder:true}),createCard(99903,'蛋白粉(黑)','special','♠',1,{wine:true,isPowder:true}),createCard(99904,'蛋白粉(黑)','special','♣',1,{wine:true,isPowder:true})];p.hand.push(...p.proteinPowder);}G.players.push(p);});
    document.getElementById('mainMenu').style.display='none';document.getElementById('gameArea').classList.add('active');renderGame();startTurn();
}
function startTurn(){if(G.gameOver)return;const p=G.players[G.turnIndex];p.roundShaUsed=0;p.jiuBuff=null;p.skillUsedThisTurn={};G.selectedCards=[];G.pendingTarget=null;p.tempCards=[];p.immuneNormalShaUsed=false;p.redShaCountThisTurn=0;p.xiexiaoUsedTargets=[];p.damageSourcesThisTurn=[];p.killerActive=false;p.killerX=0;p.killerCards=[];if(p.skills.includes('变脚')&&!p.shieldedSkills.includes('变脚')){const cards=drawCards(2);p.xiaoJiaoYa.push(...cards);addLog(`${p.generalName}变脚获得小脚丫`);}if(p.skills.includes('握力')&&!p.woliUsed&&!p.shieldedSkills.includes('握力')){p.woliUsed=true;const j=drawCards(1)[0];if(j){G.discardPile.push(j);if(j.color==='red'){p.hp=Math.min(p.maxHp,p.hp+1);p.maxHp+=2;}p.hand.push(j);addLog(`${p.generalName}握力发动`);}}if(G.mode==='doudizhu'&&p.role==='地主'){const extra=drawCards(1);p.hand.push(...extra);p.roundShaUsed=-1;addLog('地主跋扈摸1张');}proceedToJudgement();}
function proceedToJudgement(){G.phase='judgement';const p=G.players[G.turnIndex];if(p.judgeZone.length>0)processJudgements(p,proceedToDraw);else proceedToDraw();}
function processJudgements(p,cb){if(p.judgeZone.length===0||!p.alive){cb();return;}const jcard=p.judgeZone.shift();const revealed=drawCards(1)[0];if(!revealed){cb();return;}G.discardPile.push(revealed);showJudgeDisplay(revealed,()=>{if(jcard.name==='乐不思蜀'){if(revealed.suit!=='♥'){G.phase='skipped_play';addLog(`${p.generalName}乐不思蜀跳过出牌`);}else addLog('乐不思蜀无效');}else if(jcard.name==='兵粮寸断'){if(revealed.suit!=='♣'){G.phase='skipped_draw';addLog(`${p.generalName}兵粮寸断跳过摸牌`);}else addLog('兵粮寸断无效');}else if(jcard.name==='闪电'){let dmg=3;if(p.skills.includes('QQ')&&!p.shieldedSkills.includes('QQ'))dmg=1;if(revealed.suit==='♠'&&revealed.number>=2&&revealed.number<=9){dealDamage(null,p,dmg,'thunder');addLog(`闪电判定黑桃，${p.generalName}受${dmg}伤害`);}else{const next=G.players[(G.turnIndex+1)%G.players.length];if(next&&next.alive)next.judgeZone.push(createCard(9999,'闪电','delay_trick','♠',2));addLog('闪电转移');}}if(p.judgeZone.length>0&&p.alive)setTimeout(()=>processJudgements(p,cb),600);else cb();});}
function proceedToDraw(){if(G.gameOver)return;const p=G.players[G.turnIndex];if(G.phase==='skipped_draw'){G.phase='play';renderGame();if(p.isAI)aiTakeTurn();return;}G.phase='draw';let count=2;if(G.mode==='duel'&&!G.firstRoundDone&&G.turnIndex===0)count=1;const drawn=drawCards(count);p.hand.push(...drawn);addLog(`${p.generalName}摸${drawn.length}张牌`);if(G.phase==='skipped_play'){G.phase='discard';endPlayPhase();return;}G.phase='play';renderGame();if(p.isAI)aiTakeTurn();}
function endPlayPhase(){G.phase='discard';const p=G.players[G.turnIndex];const limit=p.getHandLimit();if(p.hand.length>limit){const excess=p.hand.length-limit;addLog(`${p.generalName}需弃${excess}张牌`);if(p.isAI){aiDiscard(p,excess);proceedToEnd();}else{G.pendingAction={type:'discard',player:G.turnIndex,min:excess};renderGame();}}else proceedToEnd();}
function proceedToEnd(){
    G.phase='end';const p=G.players[G.turnIndex];
    if(p.skills.includes('炫富')&&!p.shieldedSkills.includes('炫富')){const opp=G.players[1-G.turnIndex];if(p.hand.length<=opp.hand.length){const d=drawCards(1)[0];if(d)p.hand.push(d);if(p.hand.length<=opp.hand.length){p.hp--;p.maxHp--;addLog('炫富扣体降上限');}}}
    if(p.skills.includes('女色')&&!p.shieldedSkills.includes('女色')){let fc=0;G.players.forEach(pl=>{if(pl.alive&&pl.gender==='female')fc++;});if(fc>0){p.hp-=fc;p.maxHp-=fc;addLog(`女色扣${fc}体上限`);}}
    if(p.genKey==='大肌肉'&&p.proteinPowder.filter(c=>c.isPowder).length===0&&p.alive){p.hp=0;checkDeath(p);addLog('依赖触发阵亡');}
    p.hand=p.hand.filter(c=>!p.tempCards.includes(c));
    p.tempCards.forEach(c=>{if(p.hand.includes(c))p.hand.splice(p.hand.indexOf(c),1);G.discardPile.push(c);});
    p.tempCards=[];
    if(!G.gameOver){G.turnIndex=(G.turnIndex+1)%G.players.length;while(!G.players[G.turnIndex].alive)G.turnIndex=(G.turnIndex+1)%G.players.length;if(G.mode==='sameDevice')G.sameDeviceView=G.turnIndex;G.firstRoundDone=true;renderGame();startTurn();}
}
function checkDeath(victim,killer){if(victim.hp<=0&&victim.alive){if(victim.skills.includes('拾荒')&&!victim.shieldedSkills.includes('拾荒')){if(victim.isAI){const ally=G.players.find(p=>p!==victim&&p.alive);if(ally){ally.hp--;victim.hp+=2;addLog('拾荒队友掉1体回2体');}}else{G.pendingAction={type:'shihuang',player:G.players.indexOf(victim)};renderGame();return;}}if(victim.skills.includes('被贬')&&!victim.awakened&&!victim.shieldedSkills.includes('被贬')){victim.awakened=true;victim.maxHp=3;victim.hp=3;victim.skills=[];addLog('被贬觉醒');return;}victim.alive=false;addLog(`${victim.generalName}阵亡`);if(victim.equips.armor?.name==='白银狮子'){victim.hp=Math.min(victim.maxHp,victim.hp+1);addLog('白银狮子回1体');}if(G.mode==='identity'){victim.revealedRole=victim.role;if(victim.role==='反贼'&&killer)killer.hand.push(...drawCards(3));if(victim.role==='忠臣'&&killer?.role==='主公'){killer.hand=[];killer.equips={weapon:null,armor:null,def_horse:null,atk_horse:null};}}if(victim.skills.includes('解体')&&!victim.shieldedSkills.includes('解体')){victim.genKey='尸块';victim.generalName='尸块';victim.skills=['尸灵','控尸','尸变'];victim.alive=true;victim.hp=4;victim.maxHp=4;if(killer){killer.genKey='尸块';killer.generalName='尸块';killer.skills=['尸灵','控尸','尸变'];}}if(G.players.filter(p=>p.alive).length===1){G.gameOver=true;setTimeout(()=>{alert('游戏结束！');resetToMenu();},500);}}renderGame();}
function dealDamage(source,target,amount,dmgType='normal',card=null){
    if(!target.alive)return;
    if(target.skills.includes('大头')&&!target.shieldedSkills.includes('大头')&&dmgType==='normal'&&card&&card.name==='杀'&&!target.immuneNormalShaUsed){target.immuneNormalShaUsed=true;addLog('大头免疫1点普通杀伤害');return;}
    if(source&&source.skills.includes('通背')&&!source.shieldedSkills.includes('通背')&&target.hand.length===0&&!target.equips.armor){amount++;addLog('通背：目标无手牌无防具，伤害+1');}
    if(target.skills.includes('逃单')&&amount>1&&!target.shieldedSkills.includes('逃单')){amount=1;addLog('逃单伤害压至1');}
    if(target.equips.armor?.name==='白银狮子'&&amount>1){amount=1;addLog('白银狮子减伤');}
    if(target.equips.armor?.name==='藤甲'){if((dmgType==='normal'&&card?.name==='杀')||card&&(card.name==='南蛮入侵'||card.name==='万箭齐发')){addLog('藤甲免疫');return;}if(dmgType==='fire'){amount+=1;addLog('藤甲火伤+1');}}
    if(target.equips.armor?.name==='仁王盾'&&card?.name.includes('杀')&&card.color==='black'){addLog('仁王盾免疫黑杀');return;}
    target.hp-=amount;addLog(`${target.generalName}受到${amount}点伤害`);
    if(source)target.damageSourcesThisTurn.push(source);
    if(target.skills.includes('车子')&&card&&source){target.carTokens.push(card);addLog(`${target.generalName}获得车标记`);}
    if(target.skills.includes('几何')&&target.alive&&!target.shieldedSkills.includes('几何')){const gj=drawCards(1)[0];if(gj){G.discardPile.push(gj);const opp=G.players[1-G.players.indexOf(target)];if(gj.suit==='♥'){target.hp=Math.min(target.maxHp,target.hp+1);target.maxHp++;}else if(gj.suit==='♦')opp.judgeZone.push(createCard(99910,'乐不思蜀','delay_trick','♦',6));else if(gj.suit==='♣')opp.judgeZone.push(createCard(99911,'兵粮寸断','delay_trick','♣',4));else if(gj.suit==='♠')opp.hp--;}}
    if(source&&source.skills.includes('通背')&&!source.shieldedSkills.includes('通背')&&source.alive&&amount>0){const j=drawCards(1)[0];if(j){G.discardPile.push(j);if(j.color==='red'){source.hand.push(j);addLog('通背判定红，获得判定牌');}else{if(target.hand.length>0){const idx=Math.floor(Math.random()*target.hand.length);G.discardPile.push(target.hand.splice(idx,1)[0]);addLog('通背判定黑，弃置目标一手牌');}}}}
    if(target.hp<=0)checkDeath(target,source);
}
function showJudgeDisplay(card,cb){const el=document.getElementById('judgeDisplay');el.innerHTML=`判定：${card.suit}${card.number} ${card.name}`;el.style.display='block';setTimeout(()=>{el.style.display='none';cb();},1000);}
function showQuickSelect(options,callback){const modal=document.getElementById('modalContainer');let html=`<div class="modal-overlay"><div class="modal"><h3>选择</h3>`;options.forEach(opt=>{html+=`<button style="margin:5px;" onclick="document.getElementById('modalContainer').innerHTML='';window._quickCb('${opt}')">${opt}</button>`;});html+=`</div></div>`;modal.innerHTML=html;window._quickCb=callback;}
function useSkill(skillName){
    const p=G.players[G.turnIndex];if(!p.skills.includes(skillName)||p.shieldedSkills.includes(skillName))return;
    if(skillName!=='杀手'&&p.skillUsedThisTurn[skillName])return;
    if(skillName!=='杀手')p.skillUsedThisTurn[skillName]=true;
    const opp=G.players.find(t=>t!==p&&t.alive);
    switch(skillName){
        case '飞车':if(p.carTokens.length>0){p.carTokens.pop();if(opp)opp.judgeZone.push(createCard(9999,'闪电','delay_trick','♠',2));addLog('飞车发动');}break;
        case '射手':if(p.hp>1){p.hp--;p.shooterCount++;if(opp)opp.judgeZone.push(createCard(9998,'闪电','delay_trick','♠',2));addLog('射手发动');}break;
        case '黄温':if(!p.huangWenUsed){const cnt=p.hand.length;p.hand.forEach(c=>G.discardPile.push(c));p.hand=[];p.huangWenUsed=true;if(opp)dealDamage(p,opp,cnt);addLog('黄温发动');}break;
        case '脱水':if(p.maxHp>1){p.maxHp--;if(p.hp>p.maxHp)p.hp=p.maxHp;if(opp)dealDamage(p,opp,1,'fire');addLog('脱水发动');}break;
        case '耳机':{const black=p.hand.findIndex(c=>c.color==='black');if(black>=0){p.hand.splice(black,1);if(opp)dealDamage(p,opp,1,'fire');addLog('耳机发动');}}break;
        case '新定':{if(G.selectedCards.length===0)break;const sc=G.selectedCards[0];if(sc.playerIdx!==G.turnIndex)break;const card=p.hand[sc.cardIdx];p.hand.splice(sc.cardIdx,1);G.selectedCards=[];const types=['杀','闪','桃','酒','过河拆桥','顺手牵羊','决斗','无中生有','乐不思蜀','兵粮寸断'];const choice=prompt('充当：'+types.join('/'));if(choice&&types.includes(choice))p.hand.push(createCard(Date.now(),choice,'trick',card.suit,card.number));addLog('新定发动');}break;
        case '尸变':G.players.filter(t=>t!==p&&t.alive).forEach(o=>dealDamage(p,o,1));addLog('尸变全体伤害');break;
        case '演戏':{
            const targets=G.players.filter(t=>t!==p&&t.alive);if(targets.length===0)return;
            showQuickSelect(['弃2手牌','使用无懈可击'],choice=>{
                if(choice==='弃2手牌'){if(p.hand.length<2){alert('手牌不足');return;}p.hand.splice(0,2).forEach(c=>G.discardPile.push(c));}
                else{const idx=p.hand.findIndex(c=>c.name==='无懈可击');if(idx<0){alert('没有无懈可击');return;}G.discardPile.push(p.hand.splice(idx,1)[0]);}
                const oppNames=targets.map(t=>t.generalName);
                showQuickSelect(oppNames,targetName=>{
                    const target=targets.find(t=>t.generalName===targetName);
                    if(target){const pool=[...target.hand,...Object.values(target.equips).filter(e=>e)];if(pool.length>0){const chosen=pool[Math.floor(Math.random()*pool.length)];if(chosen._slot)target.equips[chosen._slot]=null;else target.hand.splice(target.hand.indexOf(chosen),1);G.discardPile.push(chosen);addLog(`演戏：${target.generalName}弃置了${chosen.name}`);}}
                    renderGame();
                });
            });
        }break;
        case '钢尺':{
            if(!opp)return;
            if(p.hand.length===0||opp.hand.length===0){alert('双方都需要有手牌');return;}
            const pDiscard=p.hand.splice(Math.floor(Math.random()*p.hand.length),1)[0]; G.discardPile.push(pDiscard);
            const oppDiscard=opp.hand.splice(Math.floor(Math.random()*opp.hand.length),1)[0]; G.discardPile.push(oppDiscard);
            dealDamage(p,opp,1,'normal');
            addLog(`钢尺发动：弃置双方各1张牌，${opp.generalName}受到1点伤害`);
        }break;
        case '忆景':{
            if(p.hp<=1||p.hand.length===0){alert('需要至少1点体力和1张手牌');return;}
            p.hp--;const discard=p.hand.splice(Math.floor(Math.random()*p.hand.length),1)[0];G.discardPile.push(discard);
            const cards=drawCards(3);p.hand.push(...cards);cards.forEach(c=>p.tempCards.push(c));
            addLog(`忆景发动：扣1体弃1牌摸3张临时牌`);
        }break;
        case '帽子':{
            if(p.hatUsed){alert('帽子已使用过');return;}
            if(p.hand.length===0){alert('无牌可弃');return;}
            p.hatUsed=true;
            const count = p.hand.length;
            p.hand.forEach(c => G.discardPile.push(c));
            p.hand = [];
            if(p.hp === p.maxHp){
                p.maxHp += count;
                p.hp = p.maxHp;
                addLog(`帽子：满血，增加${count}体力上限并回满`);
            } else {
                p.hp = Math.min(p.maxHp, p.hp + count);
                addLog(`帽子：回复${count}点体力`);
            }
        }break;
        case '杀手':{
            const x=parseInt(prompt('选择x值（1-3）'));
            if(isNaN(x)||x<1||x>3){alert('请输入1-3');return;}
            const choice=prompt('选择支付代价：扣体力 或 弃牌（输入“体力”或“弃牌”）');
            if(choice==='体力'){
                if(p.hp<x){alert('体力不足');return;}
                p.hp-=x;addLog(`杀手扣${x}体力`);
            }else if(choice==='弃牌'){
                if(p.hand.length<2*x){alert(`手牌不足${2*x}张`);return;}
                for(let i=0;i<2*x;i++){const idx=Math.floor(Math.random()*p.hand.length);G.discardPile.push(p.hand.splice(idx,1)[0]);}
                addLog(`杀手弃${2*x}张手牌`);
            }else{alert('无效选择');return;}
            p.killerX=x;p.killerActive=true;
            const shaCards=Array.from({length:x},()=>createCard(Date.now()+Math.random(),'杀','basic','♠',1,{dmgType:'normal'}));
            p.hand.push(...shaCards);p.killerCards=shaCards;
            addLog(`杀手发动：获得${x}张杀，本回合目标需${x}张闪`);
        }break;
    }
    renderGame();
}
function playerEquip(){if(G.selectedCards.length===0)return;const sc=G.selectedCards[0];const p=G.players[sc.playerIdx];const card=p.hand[sc.cardIdx];if(!card||card.type!=='equip')return;const slot=card.equipType;if(p.equips[slot])p.hand.push(p.equips[slot]);p.equips[slot]=card;p.hand.splice(sc.cardIdx,1);G.selectedCards=[];addLog(`${p.generalName}装备${card.name}`);renderGame();}
function clickCard(playerIdx,cardIdx){if(G.gameOver)return;const isViewing=(G.mode==='sameDevice')?(playerIdx===G.sameDeviceView):(playerIdx===G.turnIndex);if(!isViewing)return;const idx=G.selectedCards.findIndex(sc=>sc.playerIdx===playerIdx&&sc.cardIdx===cardIdx);if(idx>=0)G.selectedCards.splice(idx,1);else{if(G.selectedCards.length>=5)G.selectedCards.shift();G.selectedCards.push({playerIdx,cardIdx});}renderGame();}
function playerUseCard(){
    if(G.selectedCards.length===0)return;const sc=G.selectedCards[0];const p=G.players[sc.playerIdx];const card=p.hand[sc.cardIdx];if(!card)return;
    const targets=G.players.filter(t=>t!==p&&t.alive);
    if(card.name==='铁索连环'&&!G.pendingTarget){
        if(p.skills.includes('肛尺')&&!p.shieldedSkills.includes('肛尺')){
            showQuickSelect(['当雷杀使用','重铸'],choice=>{
                p.hand.splice(sc.cardIdx,1);G.selectedCards=[];
                if(choice==='重铸'){G.discardPile.push(card);const d=drawCards(1);if(d.length)p.hand.push(...d);addLog('重铸铁索连环');}
                else{
                    const shaCard=createCard(card.id,'杀','basic',card.suit,card.number,{dmgType:'thunder'});
                    G.pendingTarget={card:shaCard,cardIdx:p.hand.length,playerIdx:sc.playerIdx};
                    p.hand.push(shaCard);
                }
                renderGame();
            });
        }else{
            p.hand.splice(sc.cardIdx,1);G.discardPile.push(card);G.selectedCards=[];
            const d=drawCards(1);if(d.length)p.hand.push(...d);addLog('重铸铁索连环');
            renderGame();
        }
        return;
    }
    if(card.name.includes('杀')||card.name==='决斗'||card.name==='过河拆桥'||card.name==='顺手牵羊'||card.name==='乐不思蜀'||card.name==='兵粮寸断'){
        if(targets.length===0)return;G.pendingTarget={card,cardIdx:sc.cardIdx,playerIdx:sc.playerIdx};renderGame();
    }else{
        p.hand.splice(sc.cardIdx,1);G.discardPile.push(card);G.selectedCards=[];
        if(card.name==='桃'){p.hp=Math.min(p.maxHp,p.hp+1);addLog(`${p.generalName}使用桃`);}
        else if(card.name==='酒'){p.jiuBuff=card;addLog(`${p.generalName}喝酒`);}
        else if(card.name==='无中生有'){p.hand.push(...drawCards(2));addLog(`${p.generalName}使用无中生有`);}
        else if(card.name==='桃园结义'){G.players.forEach(pl=>{if(pl.alive)pl.hp=Math.min(pl.maxHp,pl.hp+1);});addLog('桃园结义全体回1体');}
        else if(card.name==='五谷丰登'){const alive=G.players.filter(pl=>pl.alive);const cards=drawCards(alive.length);alive.forEach((pl,i)=>{if(cards[i]){pl.hand.push(cards[i]);addLog(`五谷丰登${pl.generalName}获得${cards[i].name}`);}});}
        else if(card.name==='南蛮入侵'||card.name==='万箭齐发'){handleAOE(card);return;}
        renderGame();
    }
}

function selectTarget(targetIdx){
    if(!G.pendingTarget)return;const{card,cardIdx,playerIdx}=G.pendingTarget;const p=G.players[playerIdx];const target=G.players[targetIdx];
    if(card.name.includes('杀')){
        const isThunder=card.dmgType==='thunder';
        const hasGangChi=p.skills.includes('肛尺')&&!p.shieldedSkills.includes('肛尺');
        const hasLianNu=p.equips.weapon?.name==='诸葛连弩';
        let maxSha=(p.role==='地主'?2:1);
        if(hasGangChi&&isThunder)maxSha=999;
        if(!hasLianNu&&!hasGangChi&&p.roundShaUsed>=maxSha){G.pendingTarget=null;renderGame();return;}
    }
    p.hand.splice(cardIdx,1);G.discardPile.push(card);G.pendingTarget=null;G.selectedCards=[];
    if(card.name.includes('杀')){
        p.roundShaUsed++;let dmg=1;let finalCard=card;
        if(p.equips.weapon?.name==='朱雀羽扇'&&card.name==='杀'){finalCard={...card,dmgType:'fire'};addLog('朱雀羽扇改为火杀');}
        if(p.jiuBuff){dmg++;p.jiuBuff=null;addLog('酒效果伤害+1');}
        if(p.skills.includes('BQ')&&!p.shieldedSkills.includes('BQ')){dmg=1+(p.maxHp-p.hp)+p.killCount;addLog(`BQ伤害${dmg}`);}
        if(p.skills.includes('通背')&&!p.shieldedSkills.includes('通背')&&card.color==='red'&&p.redShaCountThisTurn<2){p.redShaCountThisTurn++;finalCard.unrespondable=true;addLog('通背：红色杀无法响应');}
        if(p.killerActive&&p.killerX>0){finalCard.killerX=p.killerX;addLog(`杀手：需${p.killerX}张闪`);}
        if(target.skills.includes('顶撞')&&!target.shieldedSkills.includes('顶撞')){const j=drawCards(1)[0];if(j&&j.suit===finalCard.suit){addLog('顶撞反弹');dealDamage(target,p,dmg,finalCard.dmgType,finalCard);renderGame();return;}}
        if(target.skills.includes('跳远')&&!target.shieldedSkills.includes('跳远')){const j=drawCards(1)[0];if(j&&j.number>finalCard.number){addLog('跳远免疫');renderGame();return;}}
        if(target.isAI){aiResponseSha(p,target,dmg,finalCard);}else{G.pendingResponse={type:'sha',source:playerIdx,target:targetIdx,dmg,dmgType:finalCard.dmgType,card:finalCard};if(G.mode==='sameDevice')G.sameDeviceView=targetIdx;}
    }else if(card.name==='决斗'){if(target.isAI){if(target.hand.some(c=>c.name==='杀')){target.hand.splice(target.hand.findIndex(c=>c.name==='杀'),1);addLog(`${target.generalName}出杀`);}else{dealDamage(p,target,1,null,card);addLog(`${target.generalName}无杀受伤`);}}else{G.pendingResponse={type:'juedou',source:playerIdx,target:targetIdx};if(G.mode==='sameDevice')G.sameDeviceView=targetIdx;}}
    else if(card.name==='过河拆桥'||card.name==='顺手牵羊'){/*省略*/}else if(card.name==='乐不思蜀'||card.name==='兵粮寸断'){target.judgeZone.push(card);addLog(`对${target.generalName}使用${card.name}`);}
    renderGame();
}
function aiResponseSha(p,target,dmg,card){
    if(card.unrespondable){dealDamage(p,target,dmg,card.dmgType,card);return;}
    if(card.killerX){
        let count=0;
        for(let i=0;i<card.killerX;i++){const idx=target.hand.findIndex(c=>c.name==='闪');if(idx>=0){target.hand.splice(idx,1);count++;}else break;}
        if(count<card.killerX){dealDamage(p,target,dmg,card.dmgType,card);}
        return;
    }
    if(target.equips.armor?.name==='八卦阵'){const j=drawCards(1)[0];if(j&&j.color==='red'){addLog('八卦阵判定红视为出闪');return;}}
    if(target.hand.some(c=>c.name==='闪')){target.hand.splice(target.hand.findIndex(c=>c.name==='闪'),1);addLog(`${target.generalName}出闪`);}else{dealDamage(p,target,dmg,card.dmgType,card);}
}
function respondToSha(useShan){if(!G.pendingResponse||G.pendingResponse.type!=='sha')return;const{source,target,dmg,dmgType,card}=G.pendingResponse;const pTarget=G.players[target],pSource=G.players[source];if(card.unrespondable){alert('此杀无法响应！');G.pendingResponse=null;dealDamage(pSource,pTarget,dmg,dmgType,card);if(G.mode==='sameDevice')G.sameDeviceView=G.turnIndex;renderGame();return;}if(card.killerX){let count=0;if(useShan){for(let i=0;i<card.killerX;i++){const idx=pTarget.hand.findIndex(c=>c.name==='闪');if(idx>=0){pTarget.hand.splice(idx,1);count++;}else break;}if(count<card.killerX){alert(`需要${card.killerX}张闪，只有${count}张`);return;}}else{dealDamage(pSource,pTarget,dmg,dmgType,card);}G.pendingResponse=null;if(G.mode==='sameDevice')G.sameDeviceView=G.turnIndex;renderGame();return;}if(useShan){if(pTarget.equips.armor?.name==='八卦阵'){const j=drawCards(1)[0];if(j&&j.color==='red'){addLog('八卦阵判定红视为出闪');G.pendingResponse=null;if(G.mode==='sameDevice')G.sameDeviceView=G.turnIndex;renderGame();return;}}const si=pTarget.hand.findIndex(c=>c.name==='闪');if(si<0){alert('无闪');return;}G.discardPile.push(pTarget.hand.splice(si,1)[0]);addLog(`${pTarget.generalName}出闪`);}else{dealDamage(pSource,pTarget,dmg,dmgType,card);}G.pendingResponse=null;if(G.mode==='sameDevice')G.sameDeviceView=G.turnIndex;renderGame();}
function respondToJuedou(useSha){if(!G.pendingResponse||G.pendingResponse.type!=='juedou')return;const{source,target}=G.pendingResponse;const pTarget=G.players[target],pSource=G.players[source];if(useSha){const si=pTarget.hand.findIndex(c=>c.name==='杀');if(si<0){alert('无杀');return;}G.discardPile.push(pTarget.hand.splice(si,1)[0]);addLog(`${pTarget.generalName}出杀`);G.pendingResponse={type:'juedou',source:target,target:source};if(G.mode==='sameDevice')G.sameDeviceView=source;renderGame();}else{dealDamage(pSource,pTarget,1);G.pendingResponse=null;if(G.mode==='sameDevice')G.sameDeviceView=G.turnIndex;renderGame();}}
function aiTakeTurn(){const p=G.players[G.turnIndex];if(!p.isAI||G.gameOver)return;setTimeout(()=>{const targets=G.players.filter(t=>t!==p&&t.alive);if(targets.length===0)return;const opp=targets[0];if(p.hp<p.maxHp){const ti=p.hand.findIndex(c=>c.name==='桃');if(ti>=0){p.hand.splice(ti,1);p.hp++;addLog('AI吃桃');}}let equipCards=p.hand.filter(c=>c.type==='equip');for(let card of equipCards){const slot=card.equipType;if(p.equips[slot]){G.discardPile.push(p.equips[slot]);p.hand.push(p.equips[slot]);}p.equips[slot]=card;p.hand.splice(p.hand.indexOf(card),1);addLog(`AI装备${card.name}`);}const trickPriority=['过河拆桥','顺手牵羊','决斗','南蛮入侵','万箭齐发','乐不思蜀','兵粮寸断'];for(let name of trickPriority){const idx=p.hand.findIndex(c=>c.name===name);if(idx>=0){const card=p.hand.splice(idx,1)[0];G.discardPile.push(card);if(card.name==='南蛮入侵'||card.name==='万箭齐发'){handleAOE(card);}else if(card.name==='决斗'){if(opp.hand.some(c=>c.name==='杀'))opp.hand.splice(opp.hand.findIndex(c=>c.name==='杀'),1);else dealDamage(p,opp,1,null,card);}else if(card.name==='乐不思蜀'||card.name==='兵粮寸断'){opp.judgeZone.push(card);}break;}}if(p.skills.includes('飞车')&&p.carTokens.length>0){p.carTokens.pop();opp.judgeZone.push(createCard(9999,'闪电','delay_trick','♠',2));addLog('AI飞车');}const hasLianNu=p.equips.weapon?.name==='诸葛连弩';const maxSha=(p.role==='地主'?2:1);if(hasLianNu||p.roundShaUsed<maxSha){const si=p.hand.findIndex(c=>c.name.includes('杀'));if(si>=0){const s=p.hand.splice(si,1)[0];p.roundShaUsed++;let dmg=1;if(p.jiuBuff){dmg++;p.jiuBuff=null;}if(opp.hand.some(c=>c.name==='闪'))opp.hand.splice(opp.hand.findIndex(c=>c.name==='闪'),1);else dealDamage(p,opp,dmg,s.dmgType,s);}}setTimeout(()=>endPlayPhase(),400);},500);}
function aiDiscard(p,count){for(let i=0;i<count;i++){if(p.hand.length===0)break;p.hand.splice(Math.floor(Math.random()*p.hand.length),1);}}
function renderGame(){const bf=document.getElementById('battlefield');let html='';const viewing=(G.mode==='sameDevice')?G.sameDeviceView:G.turnIndex;G.players.forEach((p,i)=>{const isLord=(G.mode==='identity'&&p.role==='主公');const showRole=isLord?'主公':(G.mode==='identity'&&!p.isAI&&!p.revealedRole)?p.role:(p.revealedRole?p.revealedRole:(G.mode!=='identity'?p.role:''));const showHand=(G.mode==='sameDevice'&&i!==viewing)?false:(!p.isAI||G.gameOver);const canTarget=G.pendingTarget&&p.alive&&i!==G.pendingTarget.playerIdx;html+=`<div class="player-zone${i===G.turnIndex?' current-turn':''}${canTarget?' target-selectable':''}" onclick="${canTarget?`selectTarget(${i})`:''}"><div><b>${p.generalName}</b>${showRole?` (${showRole})`:''} ${p.isAI?'🤖':''}</div><div>${Array(p.maxHp).fill(0).map((_,h)=>`<span class="hp-dot${h>=p.hp?' lost':''}"></span>`).join('')} ${p.hp}/${p.maxHp}</div><div class="equip-zone">${['weapon','armor','def_horse','atk_horse'].map(s=>`<div class="equip-slot">${p.equips[s]?p.equips[s].name:s}</div>`).join('')}</div>${p.judgeZone.length?`<div style="font-size:0.7em;color:#ff9800;">判定区:${p.judgeZone.map(j=>j.name).join(',')}</div>`:''}<div class="hand-cards">${showHand?p.hand.map((c,ci)=>`<div class="card-mini${c.color==='red'?' red':' black'}${G.selectedCards.some(s=>s.playerIdx===i&&s.cardIdx===ci)?' selected':''}" onclick="event.stopPropagation();clickCard(${i},${ci})">${c.name}</div>`).join(''):p.hand.map(()=>'<div class="card-back"></div>').join('')}</div></div>`;});bf.innerHTML=html;const ab=document.getElementById('actionButtons');let btns='';if(G.gameOver)btns='<button onclick="resetToMenu()">🏠 返回菜单</button>';else if(G.pendingAOE){btns+=`<button onclick="respondToAOE(true)">🃏 出${G.pendingAOE.need}</button><button onclick="respondToAOE(false)">😵 不出</button>`;}else if(G.pendingResponse){const pr=G.pendingResponse;const pTargetIdx=pr.target!==undefined?pr.target:pr.defender;if(pTargetIdx===viewing){if(pr.type==='sha'){btns+='<button onclick="respondToSha(true)">🛡 出闪</button><button onclick="respondToSha(false)">😵 不出</button>';}else if(pr.type==='juedou'){btns+='<button onclick="respondToJuedou(true)">⚔ 出杀</button><button onclick="respondToJuedou(false)">😵 不出</button>';}}}else if(G.pendingAction?.type==='discard'&&viewing===G.pendingAction.player)btns+=`<button onclick="confirmDiscard()">🗑 确认弃牌</button>`;else if(G.pendingAction?.type==='shihuang'&&viewing===G.pendingAction.player)btns+=`<button onclick="resolveShiHuang()">🗑 拾荒</button>`;else if(G.phase==='play'&&G.turnIndex===viewing&&!G.players[G.turnIndex].isAI){btns+='<button onclick="playerUseCard()">🃏 使用选中</button>';btns+='<button onclick="playerEquip()">🔧 装备</button>';const skills=G.players[G.turnIndex].skills.filter(s=>!G.players[G.turnIndex].shieldedSkills.includes(s));skills.forEach(s=>{if(['飞车','射手','黄温','脱水','耳机','尸变','新定','邪笑','演戏','钢尺','忆景','帽子','杀手'].includes(s))btns+=`<button onclick="useSkill('${s}')">✨ ${s}</button>`;});btns+='<button onclick="endPlayPhase()">✅ 结束</button>';if(G.mode==='sameDevice')btns+=`<button onclick="G.sameDeviceView=G.turnIndex;renderGame();">👁 切换视角</button>`;}ab.innerHTML=btns;}
function confirmDiscard(){if(!G.pendingAction)return;const p=G.players[G.pendingAction.player];const selected=G.selectedCards.filter(sc=>sc.playerIdx===G.pendingAction.player);if(selected.length<G.pendingAction.min)return;selected.sort((a,b)=>b.cardIdx-a.cardIdx).forEach(sc=>{G.discardPile.push(p.hand.splice(sc.cardIdx,1)[0]);});G.selectedCards=[];G.pendingAction=null;proceedToEnd();}
function resolveShiHuang(){const pa=G.pendingAction;const p=G.players[pa.player];const opp=G.players.find(pl=>pl!==p&&pl.alive);if(opp){opp.hp--;p.hp+=2;}G.pendingAction=null;if(p.hp<=0)checkDeath(p);renderGame();}
function showGeneralSelect(title,cb){window._generalCallback=cb;const modal=document.getElementById('modalContainer');let html=`<div class="modal-overlay"><div class="modal"><h3>${title}</h3><div class="general-grid">`;Object.entries(GENERALS).forEach(([k,g])=>{const skillsDesc=g.skills.map(s=>`<b>${s}</b>：${SKILL_DESC[s]||''}`).join('<br>');html+=`<div class="general-card" onclick="document.querySelectorAll('.general-card').forEach(c=>c.classList.remove('selected'));this.classList.add('selected');window._selGen='${k}'"><h4>${g.name}</h4><div>${g.title}</div><div class="skill-desc">${skillsDesc}</div></div>`;});html+=`</div><button onclick="if(window._selGen){document.getElementById('modalContainer').innerHTML='';window._generalCallback(window._selGen);}">确认</button></div></div>`;modal.innerHTML=html;window._selGen=null;}
function showRoleSelect(options,cb){const modal=document.getElementById('modalContainer');let html=`<div class="modal-overlay"><div class="modal"><h3>选择身份</h3>`;options.forEach(r=>html+=`<button style="margin:5px;" onclick="document.getElementById('modalContainer').innerHTML='';window._roleCb('${r}')">${r}</button>`);html+=`</div></div>`;modal.innerHTML=html;window._roleCb=cb;}
function startDuel(){showGeneralSelect('选择武将',gen=>{const aiGen=Object.keys(GENERALS)[Math.floor(Math.random()*10)];initGame('duel',[{name:'你',gen,isAI:false},{name:'AI',gen:aiGen,isAI:true}]);});}
function startSameDevice(){showGeneralSelect('玩家1选择武将',gen1=>{showGeneralSelect('玩家2选择武将',gen2=>{initGame('sameDevice',[{name:'玩家1',gen:gen1,isAI:false},{name:'玩家2',gen:gen2,isAI:false}]);});});}
function startDouDiZhu(){showRoleSelect(['地主','农民'],role=>{showGeneralSelect('选择武将',gen=>{const aiGen1=Object.keys(GENERALS)[Math.floor(Math.random()*10)],aiGen2=Object.keys(GENERALS)[Math.floor(Math.random()*10)];if(role==='地主'){initGame('doudizhu',[{name:'你(地主)',gen,isAI:false,role:'地主'},{name:'农民A',gen:aiGen1,isAI:true,role:'农民'},{name:'农民B',gen:aiGen2,isAI:true,role:'农民'}]);}else{initGame('doudizhu',[{name:'地主',gen:aiGen1,isAI:true,role:'地主'},{name:'你(农民)',gen,isAI:false,role:'农民'},{name:'农民B',gen:aiGen2,isAI:true,role:'农民'}]);}});});}
function startIdentity(){const roles=['主公','忠臣','反贼','反贼','内奸'];for(let i=roles.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[roles[i],roles[j]]=[roles[j],roles[i]];}showGeneralSelect('选择武将',gen=>{const configs=[{name:'你',gen,isAI:false,role:roles[0]}];for(let i=1;i<5;i++)configs.push({name:`AI${i}`,gen:Object.keys(GENERALS)[Math.floor(Math.random()*10)],isAI:true,role:roles[i]});initGame('identity',configs);});}
function resetToMenu(){location.reload();}
document.getElementById('logPanel').innerHTML='<div>选择模式开始游戏</div>';
</script>
